# Docker Compose файл для hw2.
#
# Имя образа для back/front собирается из переменных DOCKERHUB_USERNAME и IMAGE_TAG —
# их compose берёт из .env.development.compose, который мы передаём флагом --env-file
# (см. Makefile).
#
# В этом файле НИГДЕ не должно быть сборки из исходников: образы должны браться
# готовыми с Docker Hub. Если потребуется собрать — это делает Makefile, не compose.

services:
  db:
  image: postgres:16-alpine
  restart: unless-stopped
  environment:
    POSTGRES_USER: myapp_user
    POSTGRES_PASSWORD: change_me_please
    POSTGRES_DB: myapp
  volumes:
    - pgdata:/var/lib/postgresql/data
  healthcheck:
    test: ["CMD", "pg_isready", "-U", "myapp_user", "-d", "myapp"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 10s
  ports:
    - "15432:5432"
      


  
    # TODO — база данных:
    #   - указать готовый образ postgres 16-alpine
    #   - подать переменные окружения из соответствующего env-файла
    #   - пробросить порт наружу на 15432 (внешний выбран так, чтобы не конфликтовать
    #     с локально установленным Postgres)
    #   - персистить данные через NAMED VOLUME (не bind-mount); имя тома — pgdata
    #   - добавить проверку готовности: запрос к самой БД через pg_isready,
    #     с использованием POSTGRES_USER и POSTGRES_DB
    #     ⚠️ переменные окружения внутри проверки экранируются двойным $$,
    #     иначе compose попытается подставить их сам на этапе парсинга файла
    #     (а нам надо, чтобы их разворачивал shell внутри контейнера в рантайме)
    #   - подобрать осмысленные параметры проверки: как часто опрашивать, сколько
    #     попыток до признания unhealthy, сколько ждать перед самой первой проверкой

  back:
    image: ${DOCKERHUB_USERNAME}/todo-back:${APP_VERSION}
    restart: unless-stopped       # ← перезапускать при сбое и при ребуте VPS
    environment:
      APP_VERSION: ${APP_VERSION} 
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.development.back    # ← все переменные для бэкенда
    ports:
      - "13000:3000"
    volumes:
      - ./app-config:/app/config:ro


    # TODO — backend (NestJS):
    #   - указать образ, который ты публикуешь в свой Docker Hub репозиторий
    #     (используй переменные DOCKERHUB_USERNAME и IMAGE_TAG)
    #   - подать переменные окружения из соответствующего env-файла
    #     (не забудь: в нём DB_HOST теперь смотрит на service-name из compose-сети)
    #   - пробросить порт API на 13000
    #   - выразить зависимость от базы: back не должен стартовать, пока БД не
    #     ответит на healthcheck успешно (используй подходящую condition)
    #   - примонтировать локальную папку с runtime-конфигом внутрь контейнера
    #     по пути /app/config; делаем это READ-ONLY, чтобы контейнер физически
    #     не мог изменить файл на хосте

  front:
    image: ${DOCKERHUB_USERNAME}/todo-front:${APP_VERSION}
    restart: unless-stopped
  #  build:
 #     context: ./front
  #    args:
    ports:
     - "18080:80"
    depends_on:
      back:
        condition: service_started
 
    # TODO — frontend (nginx со статикой):
    #   - указать образ из своего Docker Hub репозитория
    #   - пробросить 80-й порт nginx наружу на 18080
    #   - выразить зависимость от back, но НЕ через service_healthy:
    #     у back в этом задании нет healthcheck, поэтому здесь нужна другая condition
    #     (которая ждёт только запуска контейнера, не его health-статуса)

volumes:
  pgdata:
  # TODO — секция named volumes:
  #   - объявить том, имя которого ты указал в сервисе db (без дополнительных опций,
  #     пустого тела достаточно)
