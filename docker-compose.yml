# Docker Compose файл для hw2.
#
# Имя образа для back/front собирается из переменных DOCKERHUB_USERNAME и IMAGE_TAG —
# их compose берёт из .env.development.compose, который мы передаём флагом --env-file
# (см. Makefile).
#
# В этом файле НИГДЕ не должно быть сборки из исходников: образы должны браться
# готовыми с Docker Hub. Если потребуется собрать — это делает Makefile, не compose.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: myapp_user
      POSTGRES_PASSWORD: change_me_please
      POSTGRES_DB: myapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "myapp_user", "-d", "myapp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "15432:5432"
    networks:
      - app-network

  back:
    image: ${DOCKERHUB_USERNAME}/todo-back:${APP_VERSION}
    restart: unless-stopped
    environment:
      APP_VERSION: ${APP_VERSION}
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.development.back
    ports:
      - "13000:3000"
    volumes:
      - ./app-config:/app/config:ro
    networks:
      - app-network

  front:
    image: ${DOCKERHUB_USERNAME}/todo-front:${APP_VERSION}
    restart: unless-stopped
    ports:
      - "18080:80"
    depends_on:
      back:
        condition: service_started
    networks:
      - app-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - app-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped
    networks:
      - app-network

volumes:
  pgdata:
  prometheus_data:

networks:
  app-network: