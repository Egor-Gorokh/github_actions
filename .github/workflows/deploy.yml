name: Deploy

on:
  push:
    branches: [week4]

jobs:
  checks:
    uses: ./.github/workflows/typecheck.yaml

  build:
    needs: [checks]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [back, front]
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ vars.DOCKER_USER }}" --password-stdin

      - name: Build and push ${{ matrix.service }}
        env:
          IMAGE_TAG: ${{ vars.DOCKER_USER }}/todo-${{ matrix.service }}:${{ github.sha }}
          IMAGE_LATEST: ${{ vars.DOCKER_USER }}/todo-${{ matrix.service }}:latest
        run: |
          if [ "${{ matrix.service }}" == "front" ]; then
            docker build \
              --build-arg VITE_API_URL=https://goroshek.space/api \
              -t $IMAGE_TAG \
              -t $IMAGE_LATEST \
              ./${{ matrix.service }}
          else
            docker build -t $IMAGE_TAG -t $IMAGE_LATEST ./${{ matrix.service }}
          fi
          docker push $IMAGE_TAG
          docker push $IMAGE_LATEST

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/myapp

            if [ ! -f .env.development.db ]; then
              echo "POSTGRES_USER=myapp_user" > .env.development.db
              echo "POSTGRES_PASSWORD=change_me_please" >> .env.development.db
              echo "POSTGRES_DB=myapp" >> .env.development.db
            fi

            grep -q '^DOCKERHUB_USERNAME=' .env.development.compose || echo "DOCKERHUB_USERNAME=${{ vars.DOCKER_USER }}" >> .env.development.compose

            sed -i "s|^APP_VERSION=.*|APP_VERSION=sha-${{ github.sha }}|" .env.development.compose
            docker compose --env-file .env.development.compose pull back front
            docker compose --env-file .env.development.compose up -d --no-deps back front

  verify:
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test
        env:
          E2E_BASE_URL: ${{ vars.VITE_API_URL }}
        run: |
          export E2E_BASE_URL="${E2E_BASE_URL%/api}"
          if [ -f scripts/smoke.sh ]; then
            bash scripts/smoke.sh
          else
            echo "scripts/smoke.sh not found, using curl check..."
            curl -s -o /dev/null -w "%{http_code}" $E2E_BASE_URL | grep -q "200" || exit 1
          fi

  notify:
    needs: [checks, build, deploy, verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        env:
          CHECKS: ${{ needs.checks.result }}
          BUILD: ${{ needs.build.result }}
          DEPLOY: ${{ needs.deploy.result }}
          VERIFY: ${{ needs.verify.result }}
        run: |
          if [ "$CHECKS" != "success" ]; then
            TEXT="❌ Type-check упал%0A${{ github.repository }} @ ${{ github.ref_name }}%0A${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          elif [ "$BUILD" != "success" ]; then
            TEXT="❌ Build упал%0A${{ github.repository }} @ ${{ github.ref_name }}%0A${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          elif [ "$DEPLOY" != "success" ]; then
            TEXT="❌ Deploy упал%0A${{ github.repository }} @ ${{ github.ref_name }}%0A${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          elif [ "$VERIFY" != "success" ]; then
            TEXT="❌ Smoke не прошёл (задеплоено, но не отвечает корректно)%0A${{ github.repository }} @ ${{ github.ref_name }}%0A${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            TEXT="✅ Деплой успешен%0A${{ github.repository }} @ ${{ github.ref_name }}%0AActor: ${{ github.actor }}%0AVersion: sha-${{ github.sha }}"
          fi

          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$TEXT" \
            -d "disable_web_page_preview=true")

          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' || { echo "Telegram API rejected"; exit 1; }
