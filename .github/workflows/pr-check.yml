name: PR Check

on:
  workflow_call:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [23, 24]
        exclude:
          - os: windows-latest
            node-version: 23
        include:
          - node-version: 24
            experimental: true

    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: ${{matrix.node-version}}
          cache: "npm"

      - name: Установка зависимостей вот
        run: npm ci

      - name: Линтинг
        run: npm run lint

      - name: Запуск тестов
        run: npm run test
